<div style="display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 24px;">
<div>
<div style="position: relative; width: 100%; height: 260px;">
  <canvas id="prodChart" role="img" aria-label="Bar chart of total revenue by product line: Basketball Shoes 1010 billion, Running Shoes 767 billion, Athletic Apparel 729 billion, Accessories 293 billion">Revenue by product ($B): Basketball Shoes 1010, Running Shoes 767, Athletic Apparel 729, Accessories 293</canvas>
</div>
</div>
<div>
<div style="position: relative; width: 100%; height: 260px;">
  <canvas id="chanChart" role="img" aria-label="Bar chart comparing average profit margin between Direct to Consumer at 39 percent and Wholesale at 31 percent">Avg margin by channel: Direct to Consumer 39%, Wholesale 31%</canvas>
</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('prodChart'), {
  type: 'bar',
  data: {
    labels: ['Basketball', 'Running', 'Apparel', 'Accessories'],
    datasets: [{ data: [1009.5, 766.6, 728.9, 292.8], backgroundColor: '#2a78d6', borderRadius: 4, maxBarThickness: 40 }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, title: { display: true, text: 'Revenue by product ($B)', color: '#52514e', font: { size: 13, weight: 400 } } },
    scales: { y: { ticks: { callback: (v) => '$' + v + 'B' }, grid: { color: '#e1e0d9' } }, x: { grid: { display: false } } }
  }
});
new Chart(document.getElementById('chanChart'), {
  type: 'bar',
  data: {
    labels: ['Direct to Consumer', 'Wholesale'],
    datasets: [{ data: [39.3, 30.6], backgroundColor: '#1baf7a', borderRadius: 4, maxBarThickness: 60 }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, title: { display: true, text: 'Avg profit margin by channel (%)', color: '#52514e', font: { size: 13, weight: 400 } } },
    scales: { y: { ticks: { callback: (v) => v + '%' }, grid: { color: '#e1e0d9' } }, x: { grid: { display: false } } }
  }
});
</script>
