<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nike sales analysis — insight dashboard</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f1efe8;
    color: #0b0b0b;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px 60px; }
  header { margin-bottom: 20px; }
  header h1 { font-size: 22px; font-weight: 500; margin: 0 0 4px; }
  header p { font-size: 13px; color: #52514e; margin: 0; }
  nav {
    display: flex; flex-wrap: wrap; gap: 6px;
    border-bottom: 0.5px solid #d3d1c7; margin-bottom: 24px; padding-bottom: 12px;
  }
  nav button {
    font-size: 13px; padding: 8px 14px; border-radius: 8px; border: 0.5px solid #d3d1c7;
    background: #fcfcfb; color: #52514e; cursor: pointer; font-family: inherit;
  }
  nav button.active { background: #0b0b0b; color: #fff; border-color: #0b0b0b; }
  .tab { display: none; }
  .tab.active { display: block; }
  .card {
    background: #fcfcfb; border: 0.5px solid #e1e0d9; border-radius: 12px;
    padding: 20px 22px; margin-bottom: 18px;
  }
  .card h2 { font-size: 16px; font-weight: 500; margin: 0 0 4px; }
  .card .sub { font-size: 13px; color: #898781; margin: 0 0 16px; }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .kpi { background: #fcfcfb; border: 0.5px solid #e1e0d9; border-radius: 10px; padding: 14px 16px; }
  .kpi .label { font-size: 12px; color: #898781; margin-bottom: 6px; }
  .kpi .value { font-size: 22px; font-weight: 500; }
  .kpi .delta { font-size: 12px; margin-top: 4px; }
  .up { color: #27500a; } .down { color: #791f1f; } .flat { color: #52514e; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 700px) { .grid2 { grid-template-columns: 1fr; } }
  .chartbox { position: relative; width: 100%; height: 280px; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: #52514e; margin-bottom: 10px; }
  .legend span.sw { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 5px; vertical-align: -1px; }
  .insight {
    font-size: 13px; color: #444441; background: #f1efe8; border-radius: 8px;
    padding: 10px 14px; margin-top: 12px; line-height: 1.6;
  }
  .insight b { font-weight: 500; color: #0b0b0b; }
  ol.reco { padding-left: 20px; font-size: 14px; line-height: 1.8; color: #2c2c2a; }
  ol.reco li { margin-bottom: 10px; }
  ol.reco b { font-weight: 500; }
  .flag {
    font-size: 13px; color: #633806; background: #faeeda; border-radius: 8px;
    padding: 10px 14px; margin-bottom: 18px; line-height: 1.6;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Nike sales analysis — insight dashboard</h1>
    <p>619 monthly records &middot; Jan 2021&ndash;Dec 2023 &middot; 4 products &times; 4 regions &times; 2 channels</p>
  </header>

  <nav id="nav"></nav>

  <div id="tabs"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
Chart.defaults.color = '#52514e';

const COLOR = { blue:'#2a78d6', aqua:'#1baf7a', amber:'#eda100', red:'#e34948', violet:'#4a3aa7', orange:'#eb6834', gray:'#888780' };

const TABS = [
  { id: 'overview', label: 'Executive overview' },
  { id: 'cycle', label: 'Boom-bust cycle' },
  { id: 'regional', label: 'Regional divergence' },
  { id: 'channel', label: 'Channel shift' },
  { id: 'margin', label: 'Margin resilience' },
  { id: 'sentiment', label: 'Sentiment vs demand' },
  { id: 'reco', label: 'Recommendations' },
];

const nav = document.getElementById('nav');
const tabsEl = document.getElementById('tabs');
TABS.forEach((t, i) => {
  const b = document.createElement('button');
  b.textContent = t.label;
  b.dataset.tab = t.id;
  if (i === 0) b.classList.add('active');
  b.onclick = () => switchTab(t.id);
  nav.appendChild(b);
});

function switchTab(id) {
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.id === 'tab-' + id));
}

tabsEl.innerHTML = `
<section id="tab-overview" class="tab active">
  <div class="flag">Note: absolute volumes in this dataset (hundreds of millions of units per row) exceed real-world Nike scale, so figures below are best read as proportional comparisons across products, regions, and channels rather than literal totals.</div>
  <div class="kpis">
    <div class="kpi"><div class="label">Total revenue (3yr)</div><div class="value">$2.80T</div><div class="delta flat">Avg margin 36.4%</div></div>
    <div class="kpi"><div class="label">2022 vs 2021</div><div class="value up">+8.4%</div><div class="delta up">Broad-based boom</div></div>
    <div class="kpi"><div class="label">2023 vs 2022</div><div class="value down">-12.1%</div><div class="delta down">Sharp reversal</div></div>
    <div class="kpi"><div class="label">DTC share, 2023</div><div class="value">61.7%</div><div class="delta up">Up from 57.1% in 2021</div></div>
  </div>
  <div class="card">
    <h2>Annual revenue, 2021&ndash;2023</h2>
    <p class="sub">The topline number hides a spike-and-reversal, not a steady trend</p>
    <div class="chartbox"><canvas id="ovChart" role="img" aria-label="Bar chart of annual revenue: 2021 921 billion dollars, 2022 998 billion dollars, 2023 878 billion dollars">Annual revenue: 2021 $921.4B, 2022 $998.4B, 2023 $878.0B</canvas></div>
    <div class="insight"><b>Six things stand out this year:</b> a 2022 boom that fully reversed in 2023, Basketball Shoes &times; North America driving the swing, Greater China in structural decline both years, Direct-to-Consumer steadily gaining share, margin quietly improving despite the revenue drop, and customer ratings rising even as price/marketing show no measurable effect on volume. Each is broken out in the tabs above.</div>
  </div>
</section>

<section id="tab-cycle" class="tab">
  <div class="card">
    <h2>Quarterly revenue, Q1 2021&ndash;Q4 2023</h2>
    <p class="sub">A synchronized rise-and-fall, peaking Q1 2022 and troughing Q1 2023</p>
    <div class="chartbox"><canvas id="qChart" role="img" aria-label="Line chart of quarterly revenue in billions of dollars, peaking at 291 billion in Q1 2022 and dropping to 182 billion in Q1 2023">Quarterly revenue billions: 224.8, 204.4, 229.9, 262.2, 291.2, 267.8, 198.6, 240.7, 182.2, 206.2, 250.8, 238.8</canvas></div>
    <div class="insight"><b>Why this matters:</b> revenue didn't erode gradually &mdash; it round-tripped. The 2023 "decline" is largely the unwinding of an unusually strong 2022, not a new structural weakness on its own.</div>
  </div>
  <div class="card">
    <h2>Which products/regions swung hardest, 2022 &rarr; 2023 (%)</h2>
    <p class="sub">Basketball Shoes and North America amplify the cycle far more than the average</p>
    <div class="chartbox"><canvas id="swingChart" role="img" aria-label="Bar chart of year over year percent change from 2022 to 2023: Basketball Shoes down 23.4 percent, North America down 25 percent, Basketball Shoes in North America down 32.1 percent, versus total company down 12.1 percent">YoY change 2022 to 2023: Total company -12.1%, Basketball Shoes -23.4%, North America -25.0%, Basketball x North America -32.1%</canvas></div>
    <div class="insight"><b>Basketball Shoes &times; North America</b> swung +17.5% then -32.1% &mdash; a wider range than either factor alone, making this specific combination the highest-leverage segment behind the overall cycle.</div>
  </div>
</section>

<section id="tab-regional" class="tab">
  <div class="card">
    <h2>Revenue by region, 2021&ndash;2023 ($B)</h2>
    <p class="sub">Every region rose then fell &mdash; except Greater China, which only fell</p>
    <div class="legend">
      <span><span class="sw" style="background:${COLOR.blue}"></span>North America</span>
      <span><span class="sw" style="background:${COLOR.aqua}"></span>Europe</span>
      <span><span class="sw" style="background:${COLOR.red}"></span>Greater China</span>
      <span><span class="sw" style="background:${COLOR.amber}"></span>Asia Pacific &amp; LatAm</span>
    </div>
    <div class="chartbox"><canvas id="regChart" role="img" aria-label="Line chart of revenue by region from 2021 to 2023. North America and Asia Pacific rise then fall. Europe declines slightly each year. Greater China declines both years without ever rising.">Region revenue by year in billions: North America 273.1, 339.5, 254.7. Europe 256.0, 234.7, 224.4. Greater China 230.0, 204.3, 188.3. Asia Pacific and Latin America 162.4, 219.8, 210.5.</canvas></div>
    <div class="insight"><b>Greater China is structurally different:</b> down 11.2% in 2022 and a further 7.8% in 2023 &mdash; it never joined the 2022 boom, unlike every other region. This points to a persistent regional issue rather than a cyclical one.</div>
  </div>
</section>

<section id="tab-channel" class="tab">
  <div class="card">
    <h2>Revenue share by channel, 2021&ndash;2023</h2>
    <p class="sub">Direct-to-Consumer gained share every year, including through the 2023 downturn</p>
    <div class="chartbox"><canvas id="chanChart" role="img" aria-label="Stacked bar chart of channel revenue share by year. Direct to Consumer grows from 57.1 percent in 2021 to 56.1 percent in 2022 to 61.7 percent in 2023, with Wholesale making up the remainder.">Channel share by year: 2021 DTC 57.1% Wholesale 42.9%. 2022 DTC 56.1% Wholesale 43.9%. 2023 DTC 61.7% Wholesale 38.3%.</canvas></div>
    <div class="insight"><b>This is a structural shift, not a cyclical one:</b> most channel mixes stall or reverse in a downturn. Here DTC share jumped its most in the worst revenue year (2023), suggesting a deliberate or resilient shift toward higher-margin direct sales.</div>
  </div>
</section>

<section id="tab-margin" class="tab">
  <div class="grid2">
    <div class="card">
      <h2>Total revenue vs. blended margin</h2>
      <p class="sub">Margin held steady even as revenue fell</p>
      <div class="chartbox"><canvas id="marginRevChart" role="img" aria-label="Bar chart of annual revenue in billions: 921 in 2021, 998 in 2022, 878 in 2023, showing a rise then fall">Revenue by year billions: 921.4, 998.4, 878.0</canvas></div>
    </div>
    <div class="card">
      <h2>Blended profit margin by year</h2>
      <p class="sub">Rose slightly every year, decoupled from revenue swings</p>
      <div class="chartbox"><canvas id="marginPctChart" role="img" aria-label="Line chart of blended profit margin percent by year: 34.99 percent in 2021, 35.05 percent in 2022, 35.22 percent in 2023, a steady rise despite revenue falling in 2023">Margin by year: 34.99%, 35.05%, 35.22%</canvas></div>
    </div>
  </div>
  <div class="card">
    <h2>Profit margin by product, 2021&ndash;2023</h2>
    <p class="sub">Basketball Shoes is pulling further ahead on margin quality, not just size</p>
    <div class="legend">
      <span><span class="sw" style="background:${COLOR.blue}"></span>Basketball Shoes</span>
      <span><span class="sw" style="background:${COLOR.aqua}"></span>Running Shoes</span>
      <span><span class="sw" style="background:${COLOR.amber}"></span>Athletic Apparel</span>
      <span><span class="sw" style="background:${COLOR.gray}"></span>Accessories</span>
    </div>
    <div class="chartbox"><canvas id="prodMarginChart" role="img" aria-label="Line chart of profit margin percent by product from 2021 to 2023. Basketball Shoes rises from 36.4 percent to 37.4 percent. Accessories stays flat around 32 percent, the lowest of all four products.">Product margin by year: Basketball Shoes 36.36, 37.21, 37.36. Running Shoes 37.11, 36.26, 37.12. Athletic Apparel 34.72, 34.52, 34.49. Accessories 32.12, 31.89, 32.08.</canvas></div>
    <div class="insight"><b>Widening gap:</b> Basketball Shoes' margin advantage over Accessories grew from 4.2 points (2021) to 5.3 points (2023) &mdash; the highest-revenue product is also becoming the most efficient one.</div>
  </div>
</section>

<section id="tab-sentiment" class="tab">
  <div class="grid2">
    <div class="card">
      <h2>Customer rating by year</h2>
      <p class="sub">Rising steadily &mdash; and moving independently of revenue</p>
      <div class="chartbox"><canvas id="ratingChart" role="img" aria-label="Line chart of average customer rating out of 5 by year: 4.16 in 2021, 4.19 in 2022, 4.21 in 2023, a steady increase">Rating by year: 4.156, 4.193, 4.208</canvas></div>
    </div>
    <div class="card">
      <h2>Unit price vs. units sold</h2>
      <p class="sub">Scatter of 150 records &mdash; essentially no relationship (r &asymp; 0.0002)</p>
      <div class="chartbox"><canvas id="scatterPrice" role="img" aria-label="Scatter plot of unit price against units sold showing no visible correlation, points scattered randomly across all price levels and volumes">Scatter of unit price versus units sold shows no correlation, r approximately 0.0002</canvas></div>
    </div>
  </div>
  <div class="card">
    <h2>Marketing spend vs. units sold</h2>
    <p class="sub">Scatter of 150 records &mdash; again no relationship (r &asymp; -0.02)</p>
    <div class="chartbox"><canvas id="scatterMkt" role="img" aria-label="Scatter plot of marketing spend per unit against units sold showing no visible correlation, points scattered randomly">Scatter of marketing spend versus units sold shows no correlation, r approximately -0.02</canvas></div>
    <div class="insight"><b>The most counter-intuitive finding in the dataset:</b> neither price nor marketing spend measurably moves volume here. In real retail data at least a weak relationship is expected. Combined with rating rising independently of revenue, this suggests sales volume in this dataset is driven by factors outside the columns provided &mdash; worth a flag on data realism as much as a business insight.</div>
  </div>
</section>

<section id="tab-reco" class="tab">
  <div class="card">
    <h2>Recommendations</h2>
    <p class="sub">Prioritized by where the evidence is strongest</p>
    <ol class="reco">
      <li><b>Investigate the Basketball Shoes &times; North America spike before reacting to the 2023 dip.</b> Its 2022 surge (+17.5%) was steeper than any other segment's, and its 2023 pullback (-32.1%) is the main reason total revenue looks weak. Confirm whether 2022 reflected a one-off demand event (launch, promotion) before treating 2023 as a decline to fix.</li>
      <li><b>Treat Greater China as a separate, structural problem, not part of the broader cycle.</b> It's the only region that never grew, declining in both 2022 and 2023. It likely needs a distinct regional strategy review rather than waiting for a "market recovery" that other regions are already experiencing.</li>
      <li><b>Lean further into Direct-to-Consumer.</b> DTC carries an 8.7-point margin advantage over Wholesale and is the one growth line that held up through the downturn. The 2023 share jump (56%&rarr;62%) suggests this shift is already working &mdash; formalizing it as a stated priority could compound the benefit.</li>
      <li><b>Protect the margin discipline already in place.</b> Margin rose every year despite volume swings, meaning pricing and cost control are functioning well independent of demand. Any recovery plan should avoid trading this margin gain away to chase 2022-level volume.</li>
      <li><b>Don't rely on price cuts or marketing spend increases to drive volume recovery.</b> Neither shows a measurable relationship with units sold in this data. If the real business behaves similarly, volume likely responds to different levers (product launches, availability, seasonality) &mdash; worth testing directly rather than assuming a price/marketing lever will work.</li>
      <li><b>Reinvest in what's working for Basketball Shoes' margin trajectory.</b> Its margin advantage over Accessories widened every year. Understanding what's driving that (mix, cost efficiency, pricing power) could be a template for lifting Accessories, currently the flattest and lowest-margin line.</li>
    </ol>
  </div>
</section>
`;

function baseLine(canvasId, labels, series) {
  return new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: {
      labels,
      datasets: series.map(s => ({
        label: s.label, data: s.data, borderColor: s.color,
        backgroundColor: s.color + '1a', fill: s.fill || false,
        tension: 0.3, pointRadius: 4, pointBackgroundColor: s.color, borderWidth: 2,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { grid: { color: '#e1e0d9' }, ticks: { callback: s => s } },
        x: { grid: { display: false } }
      }
    }
  });
}

new Chart(document.getElementById('ovChart'), {
  type: 'bar',
  data: { labels: ['2021','2022','2023'], datasets: [{ data: [921.4, 998.4, 878.0], backgroundColor: [COLOR.blue, COLOR.aqua, COLOR.red], borderRadius: 4, maxBarThickness: 70 }] },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
    scales: { y: { ticks: { callback: v => '$' + v + 'B' }, grid: { color: '#e1e0d9' } }, x: { grid: { display: false } } } }
});

baseLine('qChart', ['Q1 21','Q2 21','Q3 21','Q4 21','Q1 22','Q2 22','Q3 22','Q4 22','Q1 23','Q2 23','Q3 23','Q4 23'],
  [{ label: 'Revenue', data: [224.8,204.4,229.9,262.2,291.2,267.8,198.6,240.7,182.2,206.2,250.8,238.8], color: COLOR.blue, fill: true }]);

new Chart(document.getElementById('swingChart'), {
  type: 'bar',
  data: {
    labels: ['Total company','Basketball Shoes','North America','Basketball x North America'],
    datasets: [{ data: [-12.1, -23.4, -25.0, -32.1], backgroundColor: [COLOR.gray, COLOR.amber, COLOR.amber, COLOR.red], borderRadius: 4, maxBarThickness: 40 }]

  options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },

baseLine('regChart', ['2021','2022','2023'], [
  { label: 'North America', data: [273.1, 339.5, 254.7], color: COLOR.blue },

  { label: 'Greater China', data: [230.0, 204.3, 188.3], color: COLOR.red },

  },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
    scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, ticks: { callback: v => v + '%' }, grid: { color: '#e1e0d9' } } } }

new Chart(document.getElementById('marginRevChart'), {
  type: 'bar',
  data: { labels: ['2021','2022','2023'], datasets: [{ data: [921.4, 998.4, 878.0], backgroundColor: COLOR.blue, borderRadius: 4, maxBarThickness: 60 }] },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
    scales: { y: { ticks: { callback: v => '$' + v + 'B' }, grid: { color: '#e1e0d9' } }, x: { grid: { display: false } } } }
});

baseLine('marginPctChart', ['2021','2022','2023'], [{ label: 'Margin', data: [34.99, 35.05, 35.22], color: COLOR.aqua, fill: true }]);

baseLine('prodMarginChart', ['2021','2022','2023'], [
  { label: 'Basketball Shoes', data: [36.36, 37.21, 37.36], color: COLOR.blue },
  { label: 'Running Shoes', data: [37.11, 36.26, 37.12], color: COLOR.aqua },
  { label: 'Athletic Apparel', data: [34.72, 34.52, 34.49], color: COLOR.amber },
  { label: 'Accessories', data: [32.12, 31.89, 32.08], color: COLOR.gray },
